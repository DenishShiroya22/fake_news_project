name: Daily Knowledge Base Ingestion

on:
  schedule:
    # Runs everyday at 16:30 UTC (which is 10:00 PM IST)
    - cron: '30 16 * * *'
  workflow_dispatch: # Allows you to manually trigger it with a button click on GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants the server permission to save data back to your repo

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Live Scraper Pipeline
      run: python update_knowledge.py

    - name: Commit and Push Updated Knowledge Base
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Data Action"
        git add massive_knowledge_base.csv
        # Only commit if changes actually exist to avoid empty log spam
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Automated daily RSS knowledge base sync [skip ci]" && git push)